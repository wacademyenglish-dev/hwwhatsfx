<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Homework | What's your name?</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBase: '#121110',      
                        panelBg: '#1e1b1a',       
                        goldMain: '#cba052',      
                        textLight: '#f5f2eb',
                        textMuted: '#9e9991',
                        success: '#4b7556',
                        danger: '#823737'
                    },
                    fontFamily: {
                        heading: ['"Playfair Display"', 'serif'],
                        body: ['"Outfit"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            color: #f5f2eb;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide scrollbars for the app feel */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-check {
            background: linear-gradient(135deg, #cba052, #a67c33);
            color: #121110;
            border-radius: 100px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            transition: all 0.3s;
            border: none;
        }
        .btn-check:active { transform: scale(0.97); }

        /* Animation */
        @keyframes fadeInRight { 
            0% { opacity: 0; transform: translateX(20px); } 
            100% { opacity: 1; transform: translateX(0); } 
        }
        .animate-slide { animation: fadeInRight 0.4s ease forwards; }
    </style>
</head>
<body class="min-h-screen md:flex md:items-center md:justify-center md:p-6 bg-black">

    <!-- Phone Wrapper -->
    <div class="w-full h-[100dvh] md:w-[390px] md:h-[844px] bg-[#121110] md:rounded-[55px] md:border-[12px] border-[#1e1b1a] md:shadow-[0_0_50px_rgba(203,160,82,0.2)] overflow-hidden flex flex-col relative mx-auto">
        
        <!-- Fake Status Bar (Hidden on actual mobile devices) -->
        <div class="hidden md:flex absolute top-0 w-full h-8 z-50 justify-between items-center px-6 pt-2">
            <span class="text-white text-xs font-semibold">9:41</span>
            <div class="absolute left-1/2 -translate-x-1/2 top-0 w-32 h-7 bg-[#1e1b1a] rounded-b-3xl"></div>
            <div class="flex items-center gap-1.5 text-white">
                <i class="fa-solid fa-signal text-[10px]"></i>
                <i class="fa-solid fa-wifi text-[10px]"></i>
                <i class="fa-solid fa-battery-full text-[10px]"></i>
            </div>
        </div>

        <!-- Background Image Layers -->
        <div class="absolute inset-0 bg-[url('bg.png')] bg-cover bg-center"></div>
        <div class="absolute inset-0 shadow-[inset_0_0_0_2000px_rgba(18,17,16,0.9)]"></div>
        
        <!-- App Content -->
        <div class="relative z-10 flex-1 flex flex-col px-6 pt-10 md:pt-16 pb-10 overflow-y-auto no-scrollbar">
            <!-- Header -->
            <div class="text-center mb-8 shrink-0">
                <h1 class="font-heading italic text-4xl text-textLight mb-2">Homework</h1>
                <p class="font-body font-light text-goldMain text-xs tracking-widest uppercase">Level A1 • What's your name?</p>
            </div>
            
            <!-- App Container -->
            <div id="app" class="flex-1 flex flex-col justify-center">
                <!-- Renderizado via JS -->
            </div>
        </div>

        <!-- Fake Home Indicator -->
        <div class="hidden md:block absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1 bg-white/20 rounded-full z-50"></div>
    </div>

    <script>
        const questions = [
            { q: `"Hello" and "Hi" are greetings. Which one is formal?`, opts: ["Hello", "Hi", "Both"], correct: 0 },
            { q: `Which sentence is correct?`, opts: ["I is Tim.", "I am Tim.", "Am Tim."], correct: 1 },
            { q: `What is the short form of "I am"?`, opts: ["I's", "I'm", "Am"], correct: 1 },
            { q: `Complete: "My name _____ Sarah."`, opts: ["am", "are", "is"], correct: 2 },
            { q: `What is the short form of "name is"?`, opts: ["name's", "names'", "nam'is"], correct: 0 },
            { q: `How do you ask someone's name?`, opts: ["What's your name?", "How is name?", "What are name?"], correct: 0 },
            { q: `Complete: "_____ to meet you."`, opts: ["Nice", "Good", "Hello"], correct: 0 },
            { q: `How do you answer "What's your name?"?`, opts: ["Hello.", "My name is Tim.", "I am name Tim."], correct: 1 },
            { q: `Which one is a casual (friendly) greeting?`, opts: ["Nice to meet you", "Hello", "Hi"], correct: 2 },
            { q: `Complete the dialogue - Tim: "Hello." Sian: "_____"`, opts: ["Hi", "What's your name?", "I'm Sian"], correct: 0 },
            { q: `Which is correct?`, opts: ["Whats' your name?", "What're your name?", "What's your name?"], correct: 2 },
            { q: `True or False: "I'm" is the same as "I am".`, opts: ["True", "False"], correct: 0 },
            { q: `If someone says "Nice to meet you", you can say:`, opts: ["Nice to meet you too.", "Hello.", "My name is..."], correct: 0 },
            { q: `Complete: "_____ am Sian."`, opts: ["He", "I", "You"], correct: 1 },
            { q: `Which is the short form of "What is"?`, opts: ["What're", "Whats", "What's"], correct: 2 }
        ];

        let state = {
            current: 0,
            answers: []
        };
        let selectedAnswer = null;

        function render() {
            const app = document.getElementById('app');
            
            if (state.current >= questions.length) {
                // Final Screen
                let correctCount = state.answers.filter(a => a).length;
                let wrongCount = questions.length - correctCount;
                
                app.innerHTML = `
                    <div class="text-center p-8 bg-panelBg/80 backdrop-blur-md rounded-3xl border border-goldMain/20 shadow-xl animate-slide">
                        <i class="fa-solid fa-trophy text-6xl text-goldMain mb-6"></i>
                        <h2 class="text-4xl font-heading italic text-textLight mb-2">Quiz Finished!</h2>
                        <p class="text-xl font-body text-textMuted mb-8">Here is your result:</p>
                        
                        <div class="flex justify-center gap-6 mb-10">
                            <div class="bg-success/10 border border-success/30 p-6 rounded-2xl w-32">
                                <p class="text-5xl font-heading text-success mb-2">${correctCount}</p>
                                <p class="text-xs uppercase tracking-widest text-success/80">Correct</p>
                            </div>
                            <div class="bg-danger/10 border border-danger/30 p-6 rounded-2xl w-32">
                                <p class="text-5xl font-heading text-danger mb-2">${wrongCount}</p>
                                <p class="text-xs uppercase tracking-widest text-danger/80">Wrong</p>
                            </div>
                        </div>

                        <div class="bg-goldMain/10 border border-goldMain/30 p-6 rounded-2xl shadow-inner relative overflow-hidden">
                            <div class="absolute inset-0 bg-goldMain opacity-5 animate-pulse"></div>
                            <i class="fa-solid fa-camera text-4xl text-goldMain mb-4 relative z-10"></i>
                            <p class="text-lg text-goldMain font-body font-medium relative z-10">Tire um print desta tela e mande para o seu Teacher!</p>
                        </div>
                    </div>
                `;
                return;
            }

            // Question Screen
            let q = questions[state.current];
            app.innerHTML = `
                <div class="bg-panelBg/80 backdrop-blur-md rounded-3xl p-8 border border-goldMain/20 shadow-xl relative overflow-hidden animate-slide">
                    <div class="absolute top-0 left-0 w-full h-1 bg-white/5">
                        <div class="h-full bg-goldMain transition-all duration-500" style="width: ${((state.current + 1) / questions.length) * 100}%"></div>
                    </div>
                    
                    <p class="text-goldMain font-body text-sm tracking-widest uppercase mb-6 mt-2">Question ${state.current + 1} / ${questions.length}</p>
                    <h2 class="text-2xl font-heading text-textLight mb-10 leading-snug">${q.q}</h2>
                    
                    <div class="space-y-4 mb-10">
                        ${q.opts.map((opt, i) => `
                            <button class="w-full text-left bg-white/5 p-5 rounded-2xl border border-white/10 text-xl text-textLight transition-all active:scale-[0.98] btn-opt" onclick="selectOption(${i}, this)">
                                ${opt}
                            </button>
                        `).join('')}
                    </div>

                    <button id="btn-next" class="btn-check shadow-[0_0_30px_rgba(203,160,82,0.3)] hidden" onclick="nextQuestion()">NEXT <i class="fa-solid fa-arrow-right ml-2"></i></button>
                </div>
            `;
        }

        function selectOption(idx, btn) {
            selectedAnswer = idx;
            
            // Reset all buttons
            document.querySelectorAll('.btn-opt').forEach(b => {
                b.classList.remove('border-goldMain', 'bg-goldMain/20', 'text-goldMain');
                b.classList.add('border-white/10', 'bg-white/5', 'text-textLight');
            });
            
            // Highlight selected
            btn.classList.add('border-goldMain', 'bg-goldMain/20', 'text-goldMain');
            btn.classList.remove('border-white/10', 'bg-white/5', 'text-textLight');
            
            // Show Next
            document.getElementById('btn-next').classList.remove('hidden');
        }

        function nextQuestion() {
            if(selectedAnswer === null) return;
            let q = questions[state.current];
            let isCorrect = selectedAnswer === q.correct;
            state.answers.push(isCorrect);
            
            state.current++;
            selectedAnswer = null;
            render();
        }

        // Start
        render();
    </script>
</body>
</html>
